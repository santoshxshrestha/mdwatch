<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style id="hljs-theme-dark">
      {{ lib.hljs_theme_dark | safe }}
    </style>
    <style id="hljs-theme-light" disabled>
      {{ lib.hljs_theme_light | safe }}
    </style>
    <script id="hljs-script" type="application/json">
      {{ lib.hljs_script | safe }}
    </script>
    <title>{{ title }} - mdwatch</title>
    <style>
      {{ style | safe }}
    </style>
  </head>
  <body>
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
      <svg
        id="icon-moon"
        viewBox="0 0 24 24"
        width="24"
        height="24"
        style="display: none"
      >
        <path
          d="M21 12.79A9 9 0 0111.21 3
             7 7 0 1021 12.79z"
          fill="currentColor"
        />
      </svg>
    </button>
    <article id="content">{{content | safe}}</article>

    <script id="injected-script" type="application/json">
      {{ script | safe }}
    </script>

    <script>
      const code = document.getElementById("injected-script").textContent;
      (0, eval)(code);
      const hljsCode = document.getElementById("hljs-script").textContent;
      (0, eval)(hljsCode);
    </script>
  </body>
</html>
