<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style id="fontello">
      {{ lib.fontello | safe }}
    </style>
    <style id="hljs-theme-dark">
      {{ lib.hljs_theme_dark | safe }}
    </style>
    <style id="hljs-theme-light" disabled>
      {{ lib.hljs_theme_light | safe }}
    </style>
    <script id="hljs-script">
      {{ lib.hljs_script | safe }}
    </script>
    <title>{{ title }} - mdwatch</title>
    <style>
      {{ style | safe }}
    </style>
  </head>
  <body>
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
      <i class="icon-moon"></i>
    </button>
    <article id="content">{{content | safe}}</article>

    <script id="injected-script">
      {{ script | safe }}
    </script>
  </body>
</html>
